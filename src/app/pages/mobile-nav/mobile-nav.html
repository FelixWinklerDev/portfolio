<section class="mobile-nav-wrapper">
  <div class="headline d-flex">
    <a routerLink="/"><img class="logo" src="assets/icons/logo.png" alt="logo" /></a>
    <button class="close" (click)="close.emit()">
      <img src="assets/icons/c_close_menu.png" alt="" />
    </button>
  </div>
  <nav class="mobile-nav d-flex">
    <a class="about-me nav-link" href="#about">{{
      translationService.translate('header.nav.aboutMe')
    }}</a>
    <a class="skills nav-link" href="#skillset">{{
      translationService.translate('header.nav.skills')
    }}</a>
    <a class="projects nav-link" href="#projects">{{
      translationService.translate('header.nav.projects')
    }}</a>
    <a class="contact-me nav-link" href="#contact">{{
      translationService.translate('header.nav.contact')
    }}</a>
    <div class="d-flex slider-position">
      <button
        type="button"
        class="color-change-if-active"
        [class.active-language]="isActiveLanguage('en')"
        (click)="translationService.setLanguage('en')"
      >
        EN
      </button>
      <div class="slider-container" [class.is-de]="isActiveLanguage('de')">
        <span class="slider-pill"></span>
      </div>
      <button
        type="button"
        class="color-change-if-active"
        [class.active-language]="isActiveLanguage('de')"
        (click)="translationService.setLanguage('de')"
      >
        DE
      </button>
    </div>
    <div class="mobile-socialmedia d-flex">
      <a
        class="social-media-link"
        href="https://www.linkedin.com/in/felix-winkler-38947a365/"
        target="_blank"
        ><img class="icons" src="assets/icons/linkedin-icon.png" alt="linkedin icon"
      /></a>
      <a class="social-media-link" href="https://github.com/FelixWinklerDev" target="_blank"
        ><img class="icons" src="assets/icons/github-icon.png" alt="gitHub icon"
      /></a>
      <a class="social-media-link" href="mailto:Felix-Winkler96@web.de" target="_blank"
        ><img class="icons" src="assets/icons/mail-icon.png" alt="mail icon"
      /></a>
    </div>
  </nav>
</section>
